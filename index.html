<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>החתונה של יובל ובוריס</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main>
    <section id="cover" class="cover screen active" aria-label="דף פתיחה">
      <button class="open-invite" id="openInvite" aria-label="פתחו את ההזמנה">
        <img src="assets/opening.png" alt="הזמנה לחתונה של יובל ובוריס" />
        <span class="click-text">לחצו לפתיחת ההזמנה</span>
      </button>
    </section>

    <section id="invitation" class="invitation screen" aria-label="הזמנה לחתונה">
      <div class="image-invite">
      <img class="invite-page" src="assets/details.jpg" alt="פרטי החתונה של יובל ובוריס">
      <img class="invite-page" src="assets/couple-art.jpeg" alt="ציור של יובל ובוריס">
      <img class="invite-page" src="assets/schedule_color.jpg" alt="לוח זמנים לחתונה">

        <a class="map-link" href="https://www.google.com/maps/search/?api=1&query=%D7%90%D7%9C%D7%9B%D7%A1%D7%A0%D7%93%D7%A8%20%D7%94%D7%9E%D7%A1%D7%99%D7%A7%202%20%D7%A2%D7%9E%D7%A7%20%D7%97%D7%A4%D7%A8" target="_blank" rel="noopener">
          פתיחה במפות
        </a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
