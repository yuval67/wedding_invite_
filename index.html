<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>החתונה של יובל ובוריס</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main>
    <section id="cover" class="cover screen active">
      <div class="cover-stage">
        <img class="cover-title title-1" src="assets/were_getting_married_.png" alt="We're getting married">
        <img class="cover-title title-2" src="assets/yuval-boris-.png" alt="Yuval and Boris">

        <button class="envelope-button" id="openInvite" aria-label="פתחו את ההזמנה">
          <img class="closed-envelope" src="assets/envolow.png" alt="מעטפה סגורה">
        </button>

        <img class="press-text" src="assets/press_to_open.png" alt="לחצו על המעטפה לפתיחה">
      </div>
    </section>

    <section id="invitation" class="invitation screen">
      <div class="open-area">
        <div class="open-stage">
          <img class="open-note" src="assets/note.png" alt="פתק הזמנה">
          <img class="open-envelope-back" src="assets/envolow_open.png" alt="מעטפה פתוחה">
          <img class="open-envelope-front" src="assets/envolow_front.png" alt="חלק קדמי של מעטפה">
        </div>
      </div>
      
      <div class="image-invite">
        <img class="invite-page" src="assets/deatils_updated.png" alt="פרטי החתונה">
        <img class="invite-page" src="assets/couple-art.jpeg" alt="ציור של יובל ובוריס">
        <img class="invite-page" src="assets/schedule_color.jpg" alt="לוח זמנים">
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
